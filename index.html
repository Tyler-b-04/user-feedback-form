<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Feedback Form</title>
    <link rel="stylesheet" href="style.css"/>
</head>
<body>
    <div class="page-container" id="page-container">
        <h1>User Feedback Form</h1>

        <form id="feedback-form">
            <div class="field-group">
            <label for="user-name">Name</label>
            <input type="text" id="user-name" placeholder="Enter your name" />
            <small class="tooltip" id="name-tooltip">Enter your full name.</small>
            <small class="error" id="name-error"></small>
        </div>
         <div class="field-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" />
        <small class="tooltip" id="email-tooltip">Enter a valid email address.</small>
        <small class="error" id="email-error"></small>
      </div>

      <div class="field-group">
        <label for="comments">Comments</label>
        <textarea id="comments" rows="5" placeholder="Write your feedback here"></textarea>
        <small class="tooltip" id="comments-tooltip">Share your thoughts!</small>
        <small id="char-count">Characters: 0</small>
        <small class="error" id="comments-error"></small>
      </div>

      <button type="submit" id="submit-btn"> Click Here to Submit Feedback</button>
    </form>

</body>
</html>
